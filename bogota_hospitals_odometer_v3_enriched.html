
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0.75rem 2rem; max-width: 700px; margin: 0 auto; font-family: var(--font-sans); }

.h-btn.active { border: 1.5px solid #1D9E75; background: #E1F5EE; }

.h-icon { font-size: 20px; line-height: 1; }
.h-label { font-size: 11px; color: var(--color-text-secondary); text-align: center; line-height: 1.2; }
.dial-section { display: flex; flex-direction: column; align-items: center; margin: 1.25rem 0 0.5rem; }
.dial-svg { width: 100%; max-width: 300px; cursor: grab; }
.dial-svg:active { cursor: grabbing; }
.year-display { text-align: center; margin-top: 0.5rem; }
.year-num { font-size: 28px; font-weight: 500; color: var(--color-text-primary); }
.admin-badge { display: inline-block; margin-top: 4px; font-size: 11px; padding: 3px 10px; border-radius: var(--border-radius-md); background: #F1EFE8; color: #5F5E5A; font-weight: 500; }
.admin-badge.lopezadmin { background: #E1F5EE; color: #0F6E56; }
.admin-badge.future { background: #E6F1FB; color: #185FA5; }
.drag-hint { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
.leds { display: flex; flex-wrap: wrap; gap: 8px; margin: 0.75rem 0; }
.led { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
.led-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-border-tertiary); flex-shrink: 0; }
.led.active { border-color: var(--led-color); }

.led.active span { color: var(--color-text-primary); font-weight: 500; }
.info-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin: 0 0 1rem; min-height: 72px; }
.info-year-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.info-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin: 0.75rem 0 0.5rem; }
.timeline { display: flex; flex-direction: column; gap: 6px; }
.tl-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; }
.tl-item:hover { background: var(--color-background-secondary); }
.tl-item.selected { border-color: #1D9E75; background: #E1F5EE; }
.tl-item.zone-b { border-left: 3px solid #1D9E75; }
.tl-year { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); min-width: 36px; padding-top: 2px; }
.tl-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.4; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
</style>

const icons = { Kennedy:"🏥", Usme:"🏗", Tunal:"🏛", Meissen:"🔬", "Engativá":"🏙", Bosa:"🧱", "Simón Bolívar":"⚕", Tintal:"👶" };
const statusColors = { planning:"#EF9F27", contracting:"#D85A30", execution:"#1D9E75", suspended:"#E24B4A", delivery:"#BA7517", future:"#185FA5" };

const YEAR_MIN = 1990, YEAR_MAX = 2026;
const CX = 150, CY = 150, R = 130;

let currentHospital = "Kennedy";
let currentMilestoneIdx = 0;
let isDragging = false;

function yearToNeedleRot(year) {
  const t = (year - YEAR_MIN) / (YEAR_MAX - YEAR_MIN);
  return -90 + t * 180;
}

function getArcPoint(needleRot) {
  const svgAngle = (90 - needleRot) * Math.PI / 180;
  return { x: CX + R * Math.cos(svgAngle), y: CY - R * Math.sin(svgAngle) };
}

function posToNeedleRot(svgX, svgY) {
  const dx = svgX - CX;
  const dy = CY - svgY;
  let angle = Math.atan2(dx, dy) * 180 / Math.PI;
  return Math.max(-90, Math.min(90, angle));
}

function needleRotToYear(rot) {
  const t = (rot + 90) / 180;
  return YEAR_MIN + t * (YEAR_MAX - YEAR_MIN);
}

function setNeedle(rot) {
  document.getElementById("needleGroup").style.transform = `rotate(${rot}deg)`;
}

function arcPathForYears(y1, y2) {
  const p1 = getArcPoint(yearToNeedleRot(y1));
  const p2 = getArcPoint(yearToNeedleRot(y2));
  return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${R} ${R} 0 0 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
}

function initZoneB() {
  const d = arcPathForYears(2020, 2023);
  document.getElementById("arcZoneB").setAttribute("d", d);
  document.getElementById("arcZoneBHL").setAttribute("d", d);
}

function isZoneB(year) { return year >= 2020 && year <= 2023; }

function closestMilestone(year) {
  const events = hospitalData[currentHospital];
  let best = 0, bestDist = Infinity;
  events.forEach((e, i) => {
    const d = Math.abs(e.year - year);
    if (d < bestDist) { bestDist = d; best = i; }
  });
  return best;
}

function updateDisplay(milestoneIdx) {
  currentMilestoneIdx = milestoneIdx;
  const ev = hospitalData[currentHospital][milestoneIdx];
  document.getElementById("yearNum").textContent = ev.year;
  const badge = document.getElementById("adminBadge");
  badge.style.display = "inline-block";
  if (isZoneB(ev.year)) {
    badge.textContent = "Gestión Administración Claudia López";
    badge.className = "admin-badge lopezadmin";
  } else if (ev.year >= 2024) {
    badge.textContent = "Siguiente administración";
    badge.className = "admin-badge future";
  } else {
    badge.textContent = "Antes de 2020";
    badge.className = "admin-badge";
  }
  document.getElementById("infoYearLabel").textContent = ev.year;
  document.getElementById("infoTitle").textContent = ev.title;
  document.getElementById("infoTitle").style.color = "";
  document.getElementById("infoTitle").style.fontWeight = "500";
  document.querySelectorAll(".led").forEach(l => l.classList.toggle("active", l.dataset.status === ev.status));
  document.getElementById("arcZoneBHL").style.opacity = isZoneB(ev.year) ? "0.55" : "0";
  document.querySelectorAll(".tl-item").forEach((el, i) => el.classList.toggle("selected", i === milestoneIdx));
  setNeedle(yearToNeedleRot(ev.year));
}

function buildHospitalBar() {
  const bar = document.getElementById("hospitalBar");
  bar.innerHTML = "";
  Object.keys(hospitalData).forEach(name => {
    const btn = document.createElement("button");
    btn.className = "h-btn" + (name === currentHospital ? " active" : "");
    btn.innerHTML = `<span class="h-icon">${icons[name]||"🏥"}</span><span class="h-label">${name}</span>`;
    btn.addEventListener("click", () => selectHospital(name));
    bar.appendChild(btn);
  });
}

function buildTimeline() {
  const tl = document.getElementById("timeline");
  tl.innerHTML = "";
  hospitalData[currentHospital].forEach((ev, i) => {
    const item = document.createElement("div");
    item.className = "tl-item" + (isZoneB(ev.year) ? " zone-b" : "") + (i === currentMilestoneIdx ? " selected" : "");
    item.innerHTML = `<div class="tl-dot" style="background:${statusColors[ev.status]||'#888'}"></div><div class="tl-year">${ev.year}</div><div class="tl-text">${ev.title}</div>`;
    item.addEventListener("click", () => updateDisplay(i));
    tl.appendChild(item);
  });
}

function selectHospital(name) {
  currentHospital = name;
  buildHospitalBar();
  buildTimeline();
  updateDisplay(0);
}

const dialSvg = document.getElementById("dialSvg");

function getSVGCoords(e) {
  const rect = dialSvg.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) / rect.width * 300, y: (clientY - rect.top) / rect.height * 170 };
}

function handleMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const { x, y } = getSVGCoords(e);
  const rot = posToNeedleRot(x, y);
  const year = needleRotToYear(rot);
  updateDisplay(closestMilestone(year));
}

dialSvg.addEventListener("mousedown", e => { isDragging = true; handleMove(e); });
window.addEventListener("mousemove", handleMove);
window.addEventListener("mouseup", () => { isDragging = false; });
dialSvg.addEventListener("touchstart", e => { isDragging = true; handleMove(e); }, { passive: false });
window.addEventListener("touchmove", e => { if (isDragging) { e.preventDefault(); handleMove(e); } }, { passive: false });
window.addEventListener("touchend", () => { isDragging = false; });

let touchStartX = 0;
const bar = document.getElementById("hospitalBar");
bar.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
bar.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    const names = Object.keys(hospitalData);
    const idx = names.indexOf(currentHospital);
    const next = dx < 0 ? Math.min(idx+1, names.length-1) : Math.max(idx-1, 0);
    selectHospital(names[next]);
  }
}, { passive: true });

initZoneB();
buildHospitalBar();
buildTimeline();
updateDisplay(0);
</script>
